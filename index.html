<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❄️ Холодная Смерть | Legacy ❄️</title>
    <style>
        :root {
            --bg-color: #030303;
            --card-bg: #0a0a0a;
            --text-main: #f0f0f0;
            --accent: #fff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        /* Общие настройки */
        * { box-sizing: border-box; cursor: none !important; }
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* АНИМАЦИЯ СНЕГА */
        .snow-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background: #000;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            user-select: none;
            z-index: -1;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        /* ШАПКА */
        header {
            height: 40vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }

        .clan-logo { 
            font-size: clamp(1.8rem, 6vw, 3.5rem); 
            text-transform: uppercase; 
            letter-spacing: 0.7rem; 
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* КОНТЕНТ */
        .container { max-width: 900px; margin: 0 auto; padding: 0 1rem; position: relative; }

        .category-title {
            font-size: 0.8rem; border-left: 1px solid #333; padding-left: 8px;
            margin: 1.2rem 0 0.6rem; text-transform: uppercase; letter-spacing: 0.2rem; color: #444;
        }

        .members-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 0.7rem; 
        }

        .member-card { 
            background: var(--card-bg); 
            border: 1px solid #111; 
            transition: 0.3s; 
        }
        
        .member-card:hover { border-color: #444; }

        .photo-box {
            width: 100%; height: 230px; 
            background-size: cover; background-position: center;
            filter: grayscale(1) brightness(0.4); 
            transition: 0.5s;
        }
        
        .member-card:hover .photo-box { filter: grayscale(0.5) brightness(0.6); }

        .info { padding: 0.6rem; }
        .role { font-size: 0.5rem; color: #333; text-transform: uppercase; letter-spacing: 1px; }
        .name { font-size: 0.9rem; margin: 0.2rem 0 0.6rem; color: var(--accent); }

        .btn {
            background: transparent; border: 1px solid #151515; color: #555; padding: 0.4rem;
            width: 100%; font-family: var(--font-mono); text-transform: uppercase; font-size: 0.6rem; cursor: pointer;
        }
        .btn:hover { border-color: #fff; color: #fff; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); align-items: center; justify-content: center;
        }
        .modal-content {
            background: #050505; padding: 1.2rem; width: 85%; max-width: 350px;
            border: 1px solid #222; text-align: center;
        }
        .m-bio { margin: 0.7rem 0; color: #666; font-size: 0.8rem; line-height: 1.4; }
        
        .contact-link {
            display: none; border: 1px solid #fff; color: #fff; text-decoration: none;
            padding: 0.6rem; font-family: var(--font-mono); font-size: 0.7rem; transition: 0.2s;
            margin-top: 10px;
        }
        .contact-link:hover { background: #fff; color: #000; }

        /* НИЗ */
        .terminal { text-align: center; padding: 2rem 0; }
        .t-input {
            background: transparent; border: none; border-bottom: 1px solid #111;
            color: #222; font-family: var(--font-mono); text-align: center; width: 120px; font-size: 0.7rem;
        }
        .t-input:focus { outline: none; border-bottom-color: #444; color: #444; }

        footer { text-align: center; padding: 1.5rem; color: #111; font-family: var(--font-mono); font-size: 0.5rem; }
        
        /* КУРСОР */
        #cursor { 
            width: 8px; height: 8px; background: #fff; border-radius: 50%; 
            position: fixed; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); 
            mix-blend-mode: difference;
        }
        @media (max-width: 768px) { #cursor { display: none; } * { cursor: auto !important; } }
    </style>
</head>
<body onclick="startMusic()">

    <div id="cursor"></div>
    <div class="snow-wrapper" id="snow"></div>

    <audio id="bg-music" loop>
        <source src="https://prosearch.tribeofnoise.com/music/open/11697/1" type="audio/mpeg">
    </audio>

    <header>
        <div class="clan-logo">Холодная Смерть</div>
    </header>

    <div class="container">
        
        <h2 class="category-title">// ADMINISTRATION</h2>
        <div class="members-grid">
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1514467950401-6d88ff11696f?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Founder</div>
                    <div class="name">@Internet_blood</div>
                    <button class="btn" onclick="openModal('Internet_blood')">Access Bio</button>
                </div>
            </div>
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Deputy</div>
                    <div class="name">@Astroymovq</div>
                    <button class="btn" onclick="openModal('Astroymovq')">Access Bio</button>
                </div>
            </div>
        </div>

        <h2 class="category-title">// ELITE FORCE</h2>
        <div class="members-grid">
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1516339901601-2e1b62dc0c45?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Special Ops</div>
                    <div class="name">@smbog</div>
                    <button class="btn" onclick="openModal('smbog')">Access Bio</button>
                </div>
            </div>
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Newgen</div>
                    <div class="name">@vkhertoon</div>
                    <button class="btn" onclick="openModal('vkhertoon')">Access Bio</button>
                </div>
            </div>
        </div>

        <div class="terminal">
            <input type="text" id="term" class="t-input" placeholder="sys_code">
        </div>
    </div>

    <footer>EST. 2026 // COLD DEATH</footer>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="m-name" style="font-size: 1.1rem; letter-spacing: 1px;"></div>
            <div id="m-role" style="color: #333; font-size: 0.6rem; margin-top: 2px;"></div>
            <div id="m-bio" class="m-bio"></div>
            <a id="m-link" href="https://t.me/internet_blood" target="_blank" class="contact-link">ESTABLISH CONNECTION</a>
        </div>
    </div>

    <script>
        // СНЕГ
        function createSnow() {
            const snowWrapper = document.getElementById('snow');
            const count = 45; 
            for (let i = 0; i < count; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.innerHTML = '❄'; 
                flake.style.left = Math.random() * 100 + 'vw';
                flake.style.fontSize = (Math.random() * 8 + 4) + 'px';
                flake.style.opacity = Math.random() * 0.5 + 0.2;
                flake.style.animationDuration = (Math.random() * 4 + 5) + 's';
                flake.style.animationDelay = Math.random() * 5 + 's';
                snowWrapper.appendChild(flake);
            }
        }
        createSnow();

        // КУРСОР
        const cur = document.getElementById('cursor');
        document.addEventListener('mousemove', e => { 
            cur.style.left = e.clientX + 'px'; 
            cur.style.top = e.clientY + 'px'; 
        });

        // МУЗЫКА
        let mStarted = false;
        function startMusic() {
            if (!mStarted) {
                const a = document.getElementById('bg-music');
                a.volume = 0.05; 
                a.play().catch(() => {}); 
                mStarted = true;
            }
        }

        // ДАННЫЕ УЧАСТНИКОВ
        const data = {
            'Internet_blood': { r: 'Founder', b: 'Лидер и основатель клана. Начал путь как валидник.', isOwner: true },
            'Astroymovq': { r: 'Deputy', b: 'Верный заместитель. Поддержал проект в трудные времена.', isOwner: false },
            'smbog': { r: 'Special Ops', b: 'Мастер анонимности. Первый деф овнера.', isOwner: false },
            'vkhertoon': { r: 'Newgen', b: 'Новая кровь системы. Прошел путь вопреки преградам.', isOwner: false }
        };

        function openModal(id) {
            const m = data[id];
            document.getElementById('m-name').innerText = '@' + id;
            document.getElementById('m-role').innerText = m.r;
            document.getElementById('m-bio').innerText = m.b;
            const link = document.getElementById('m-link');
            link.style.display = m.isOwner ? 'block' : 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // ТЕРМИНАЛ
        document.getElementById('term').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.toLowerCase() === 'blood') {
                window.location.href = "https://t.me/internet_blood";
            }
        });
    </script>
</body>
</html>
