<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❄️ Холодная Смерть | Legacy ❄️</title>
    <style>
        :root {
            --bg-color: #030303;
            --card-bg: #0a0a0a;
            --accent: #ffffff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрирование всего контента */
            text-align: center; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        #snow-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        header { padding: 60px 20px 30px; }
        .clan-logo { 
            font-size: clamp(1.8rem, 7vw, 3.5rem); 
            letter-spacing: 10px; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            margin: 0 auto;
        }

        .container { width: 100%; max-width: 1000px; padding: 0 20px; display: flex; flex-direction: column; align-items: center; }

        .category-title {
            font-size: 0.8rem; color: #333; letter-spacing: 4px;
            margin: 30px 0 15px; text-transform: uppercase; width: 100%;
        }

        .members-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%;
        }

        .member-card { 
            background: var(--card-bg); border: 1px solid #111;
            width: 280px; padding: 15px; transition: 0.3s;
        }
        .member-card:hover { border-color: #333; transform: translateY(-3px); }

        .photo-box {
            width: 100%; height: 260px; background-size: cover; background-position: center;
            filter: grayscale(1) brightness(0.5); margin-bottom: 15px; border: 1px solid #000;
        }

        .name { font-size: 1.1rem; margin-bottom: 15px; letter-spacing: 1px; color: #ccc; }

        /* КНОПКИ С АНИМАЦИЕЙ НАЖАТИЯ */
        .btn {
            background: transparent; border: 1px solid #222; color: #555;
            padding: 10px; width: 100%; font-family: var(--font-mono);
            text-transform: uppercase; font-size: 0.7rem; cursor: pointer;
            transition: all 0.15s ease;
            outline: none;
        }
        .btn:active { 
            transform: scale(0.94); /* Эффект нажатия */
            background: #fff; color: #000;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .btn:hover { border-color: #666; color: #fff; }

        /* МОДАЛКА ПО ЦЕНТРУ */
        .modal {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.98);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #050505; border: 1px solid #151515; padding: 30px;
            max-width: 380px; width: 90%; text-align: center;
        }
        .m-bio { color: #555; font-size: 0.9rem; margin: 20px 0; line-height: 1.6; }
        
        .contact-link {
            display: inline-block; padding: 12px 25px; border: 1px solid #fff;
            color: #fff; text-decoration: none; font-size: 0.8rem; transition: 0.2s;
        }
        .contact-link:active { transform: scale(0.92); background: #fff; color: #000; }

        footer { padding: 50px; color: #0f0f0f; font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body onclick="autoPlay()">

    <canvas id="snow-canvas"></canvas>

    <audio id="bg-audio" loop>
        <source src="audio.m4a" type="audio/mp4">
    </audio>

    <header>
        <div class="clan-logo">Холодная Смерть</div>
    </header>

    <div class="container">
        <h2 class="category-title">// ADMINISTRATION</h2>
        <div class="members-grid">
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1514467950401-6d88ff11696f?q=80&w=600')"></div>
                <div class="name">@Internet_blood</div>
                <button class="btn" onclick="openModal('Internet_blood')">Access Dossier</button>
            </div>
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=600')"></div>
                <div class="name">@Astroymovq</div>
                <button class="btn" onclick="openModal('Astroymovq')">Access Dossier</button>
            </div>
        </div>

        <h2 class="category-title">// ELITE SQUAD</h2>
        <div class="members-grid">
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1516339901601-2e1b62dc0c45?q=80&w=600')"></div>
                <div class="name">@smbog</div>
                <button class="btn" onclick="openModal('smbog')">Access Dossier</button>
            </div>
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=600')"></div>
                <div class="name">@vkhertoon</div>
                <button class="btn" onclick="openModal('vkhertoon')">Access Dossier</button>
            </div>
        </div>
    </div>

    <footer>EST. 2026 // COLD DEATH SYSTEM</footer>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="m-name" style="font-size: 1.5rem; letter-spacing: 2px;"></div>
            <div id="m-bio" class="m-bio"></div>
            <a id="m-link" href="https://t.me/internet_blood" target="_blank" class="contact-link">ESTABLISH CONNECTION</a>
        </div>
    </div>

    <script>
        // ЛОГИКА АВТОЗВУКА
        let started = false;
        function autoPlay() {
            if (!started) {
                const audio = document.getElementById('bg-audio');
                audio.volume = 0.3; 
                audio.play().catch(e => console.log("Audio ready after click"));
                started = true;
            }
        }

        // ПЛАВНЫЙ СНЕГ (Canvas)
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Snowflake {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speed = Math.random() * 0.7 + 0.2;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.y = -5;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for(let i=0; i<100; i++) particles.push(new Snowflake());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // МОДАЛКА
        const data = {
            'Internet_blood': { b: 'Основатель и идеолог клана Холодная Смерть.', owner: true },
            'Astroymovq': { b: 'Заместитель основателя. Координация элитных операций.', owner: false },
            'smbog': { b: 'Специалист по глубокой разведке и защите данных.', owner: false },
            'vkhertoon': { b: 'Оперативник нового поколения. Высокая эффективность.', owner: false }
        };

        function openModal(id) {
            const user = data[id];
            document.getElementById('m-name').innerText = '@' + id;
            document.getElementById('m-bio').innerText = user.b;
            document.getElementById('m-link').style.display = user.owner ? 'inline-block' : 'none';
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
