<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❄️ Холодная Смерть | Legacy Elite ❄️</title>
    <style>
        /* --- ПЕРЕМЕННЫЕ И ОСНОВА --- */
        :root {
            --bg-color: #030303;
            --card-bg: #0a0a0a;
            --text-main: #f0f0f0;
            --text-muted: #555;
            --accent: #fff;
            --shadow-neon: 0 0 15px rgba(255, 255, 255, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; cursor: none !important; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- КАСТОМНЫЙ КУРСОР --- */
        #cursor {
            width: 20px; height: 20px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            transition: width 0.2s, height 0.2s;
        }
        @media (max-width: 768px) { * { cursor: auto !important; } #cursor { display: none; } }

        /* --- АНИМАЦИЯ СНЕГА --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 1.5px);
            background-size: 400px 400px, 200px 200px;
            animation: snow 40s linear infinite;
            opacity: 0.1; z-index: -2;
        }
        @keyframes snow { 0% { background-position: 0 0; } 100% { background-position: 400px 800px; } }

        /* --- ХЕДЕР С ГЛИТЧЕМ --- */
        header {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #030303 100%);
        }

        .clan-logo {
            font-size: clamp(3rem, 10vw, 5rem);
            text-transform: uppercase;
            letter-spacing: 0.8rem;
            color: var(--accent);
            position: relative;
            text-shadow: var(--shadow-neon);
        }

        .clan-logo:hover { animation: glitch 0.3s infinite; }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); text-shadow: 2px 0 red; }
            40% { transform: translate(3px, -2px); text-shadow: -2px 0 blue; }
            100% { transform: translate(0); }
        }

        .clan-subtitle {
            font-size: 1rem; color: var(--text-muted);
            font-family: var(--font-mono); margin-top: 1rem;
            letter-spacing: 0.2rem;
        }

        /* --- КОНТЕЙНЕР --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }

        .category-title {
            font-size: 1.5rem; border-left: 2px solid var(--accent);
            padding-left: 1rem; margin: 4rem 0 2rem;
            text-transform: uppercase; letter-spacing: 0.3rem;
            font-family: var(--font-mono);
        }

        /* --- КАРТОЧКИ --- */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .member-card {
            background: var(--card-bg);
            border: 1px solid #111;
            transition: var(--transition);
            position: relative;
        }

        .member-card:hover { transform: translateY(-10px); border-color: #333; }

        .photo-box {
            width: 100%; height: 300px;
            background-size: cover; background-position: center;
            filter: grayscale(1) brightness(0.7);
            transition: 0.5s;
        }

        .member-card:hover .photo-box { filter: grayscale(0.5) brightness(1); }

        .info { padding: 1.5rem; }
        .role { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1rem; }
        .name { font-size: 1.2rem; margin: 0.5rem 0 1.5rem; color: var(--accent); }

        .owner-card .name { text-shadow: 0 0 10px #fff; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .btn {
            background: transparent; border: 1px solid #222;
            color: var(--text-muted); padding: 0.8rem; width: 100%;
            font-family: var(--font-mono); text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { border-color: #fff; color: #fff; }

        /* --- МОДАЛКА --- */
        .modal {
            display: none; position: fixed; z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #0a0a0a; padding: 3rem; width: 90%; max-width: 500px;
            border: 1px solid #222; position: relative;
        }
        .close { position: absolute; top: 1rem; right: 1rem; font-size: 2rem; color: var(--text-muted); cursor: pointer; }
        .m-bio { margin: 1.5rem 0; color: #ccc; border-top: 1px solid #111; padding-top: 1.5rem; }
        .contact-link {
            display: block; background: #fff; color: #000; text-align: center;
            padding: 1rem; font-weight: bold; text-decoration: none;
            font-family: var(--font-mono); margin-top: 2rem;
        }

        /* --- ТЕРМИНАЛ --- */
        .terminal { text-align: center; padding: 5rem 0; }
        .t-input {
            background: transparent; border: none; border-bottom: 1px solid #222;
            color: #555; font-family: var(--font-mono); text-align: center; padding: 10px; width: 200px;
        }
        .t-input:focus { outline: none; border-color: #fff; color: #fff; }

        body.blood-flash { animation: flash 0.5s; }
        @keyframes flash { 0% { background: #300; } 100% { background: #030303; } }

        footer { text-align: center; padding: 3rem; color: #222; font-family: var(--font-mono); font-size: 0.8rem; }
    </style>
</head>
<body onclick="startMusic()">

    <div id="cursor"></div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" type="audio/mpeg">
    </audio>

    <header>
        <div class="clan-logo">Холодная Смерть</div>
        <div class="clan-subtitle">> LEGACY_ELITE_SYSTEM_</div>
    </header>

    <div class="container">
        
        <h2 class="category-title">:: РУКОВОДСТВО_</h2>
        <div class="members-grid">
            <div class="member-card owner-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1510915228340-29c85a43dcfe?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Создатель</div>
                    <div class="name">@Internet_blood</div>
                    <button class="btn" onclick="openModal('Internet_blood')">Досье</button>
                </div>
            </div>
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Заместитель</div>
                    <div class="name">@Astroymovq</div>
                    <button class="btn" onclick="openModal('Astroymovq')">Досье</button>
                </div>
            </div>
        </div>

        <h2 class="category-title">:: ЛЕГЕНДЫ_</h2>
        <div class="members-grid">
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1504639725590-34d0984388bd?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Бог Анонимности</div>
                    <div class="name">@smbog</div>
                    <button class="btn" onclick="openModal('smbog')">Досье</button>
                </div>
            </div>
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1580894732444-8feaff7ae726?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Ньюген</div>
                    <div class="name">@vkhertoon</div>
                    <button class="btn" onclick="openModal('vkhertoon')">Досье</button>
                </div>
            </div>
            <div class="member-card">
                <div class="photo-box" style="background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=600')"></div>
                <div class="info">
                    <div class="role">Арес</div>
                    <div class="name">@necrolustov</div>
                    <button class="btn" onclick="openModal('necrolustov')">Досье</button>
                </div>
            </div>
        </div>

        <div class="terminal">
            <input type="text" id="term" class="t-input" placeholder="> Введите код_">
        </div>
    </div>

    <footer>[ SYSTEM: HOLODNAYA SMERT // 2026 ]</footer>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="m-name" style="font-size: 2rem; font-weight: bold;"></div>
            <div id="m-role" style="color: #555; text-transform: uppercase; font-size: 0.8rem; margin-top: 5px;"></div>
            <div id="m-bio" class="m-bio"></div>
            <a href="https://t.me/internet_blood" target="_blank" class="contact-link">СВЯЗАТЬСЯ В TELEGRAM</a>
        </div>
    </div>

    <script>
        // Курсор
        const cur = document.getElementById('cursor');
        document.addEventListener('mousemove', e => { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; });

        // Музыка
        let mStarted = false;
        function startMusic() {
            if (!mStarted) {
                const a = document.getElementById('bg-music');
                a.volume = 0.1; a.play(); mStarted = true;
            }
        }

        // Данные
        const data = {
            'Internet_blood': { r: 'Создатель', b: 'Не хотел оставлять свою карьеру в комьюнити до последнего и пришел еще валидником.' },
            'Astroymovq': { r: 'Заместитель', b: 'Протянул руку помощи овнеру и никогда не сомневался в нем. Дата Лива: 01.03.2026.' },
            'smbog': { r: 'Бог Анонимности', b: 'Первый деф овнера. Подарил знания и буквально шатал всё комьюнити.' },
            'vkhertoon': { r: 'Ньюген', b: 'Пришел в момент основания. Нашел свой путь в жизни несмотря на любые проблемы.' },
            'necrolustov': { r: 'Арес', b: 'Ветеран со времен ВК. Один из сильнейших воинов в истории комьюнити.' }
        };

        function openModal(id) {
            const m = data[id];
            document.getElementById('m-name').innerText = '@' + id;
            document.getElementById('m-role').innerText = m.r;
            document.getElementById('m-bio').innerText = m.b;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Терминал
        document.getElementById('term').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (this.value.toLowerCase() === 'blood') {
                    document.body.classList.add('blood-flash');
                    setTimeout(() => window.location.href = "https://t.me/internet_blood", 600);
                } else {
                    this.value = 'DENIED';
                    setTimeout(() => this.value = '', 800);
                }
            }
        });
    </script>
</body>
</html>
