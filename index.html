<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❄️ Холодная Смерть | Legacy Elite ❄️</title>
    <style>
        /* --- ПЕРЕМЕННЫЕ И ОСНОВА --- */
        :root {
            --bg-color: #030303;
            --card-bg: #0a0a0a;
            --text-main: #f0f0f0;
            --text-muted: #555;
            --accent: #fff;
            --shadow-neon: 0 0 15px rgba(255, 255, 255, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center; 
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.6;
        }

        #snow-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* --- ШАПКА --- */
        header { padding: 100px 20px 40px; }
        
        .clan-logo { 
            font-size: clamp(2rem, 10vw, 4rem); 
            font-weight: 200;
            letter-spacing: 15px; 
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .divider {
            width: 50px;
            height: 1px;
            background: #333;
            margin: 20px auto;
        }

        /* --- КОНТЕНТ --- */
        .container { 
            width: 100%; 
            max-width: 650px; 
            padding: 0 30px;
            z-index: 10;
        }

        .manifesto {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 50px;
            font-weight: 300;
        }

        /* --- КНОПКА С ЭФФЕКТАМИ --- */
        .btn {
            display: inline-block;
            background: transparent; 
            border: 1px solid #222; 
            color: #aaa;
            padding: 18px 45px; 
            font-family: var(--font-mono);
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 4px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: var(--shadow-neon);
            transform: translateY(-2px);
        }

        /* Эффект приятного нажатия */
        .btn:active { 
            transform: scale(0.95); 
            background: #fff; 
            color: #000;
            box-shadow: 0 0 30px #fff;
        }

        /* --- ПОДВАЛ --- */
        footer { 
            margin-top: auto;
            padding: 60px 20px; 
            color: #1a1a1a; 
            font-size: 0.6rem; 
            letter-spacing: 5px; 
            font-family: var(--font-mono);
        }

        .hint {
            position: fixed;
            bottom: 30px;
            color: #222;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body onclick="playMusic()">

    <canvas id="snow-canvas"></canvas>

    <audio id="bg-audio" loop>
        <source src="2_5451914920130014652.m4a" type="audio/mp4">
    </audio>

    <header>
        <div class="clan-logo">Холодная Смерть</div>
        <div class="divider"></div>
        <div style="font-size: 0.6rem; color: #444; letter-spacing: 6px;">[ LEGACY ELITE SYSTEM ]</div>
    </header>

    <div class="container">
        <div class="manifesto">
            Мы те, кто движется в тишине. <br>
            В мире, где всё превращается в лед, мы остаемся пламенем верности и чести. <br><br>
            <span style="color: #222;">Status: Active</span><br>
            <span style="color: #222;">Connection: Encrypted</span>
        </div>
        
        <a href="https://t.me/internet_blood" target="_blank" class="btn">Establish Connection</a>
        
        <div style="margin-top: 40px; color: #151515; font-size: 0.7rem; font-family: var(--font-mono);">
            IDENT_ID: 00-BLOOD-2026
        </div>
    </div>

    <div class="hint">Нажмите для синхронизации аудиопотока</div>

    <footer>COLD DEATH // REMEMBER THE NAME</footer>

    <script>
        let isPlaying = false;
        function playMusic() {
            if (!isPlaying) {
                const audio = document.getElementById('bg-audio');
                audio.volume = 0.35;
                audio.play();
                document.querySelector('.hint').style.opacity = '0';
                isPlaying = true;
            }
        }

        /* Плавный снег */
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Snowflake {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speed = Math.random() * 0.6 + 0.2;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) { particles.push(new Snowflake()); }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
